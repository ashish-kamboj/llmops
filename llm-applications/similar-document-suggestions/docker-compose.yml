version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: confluence_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: confluence_recommendation
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: confluence_api
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
    container_name: confluence_ui
    env_file: .env
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  db_data:
